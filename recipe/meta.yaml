{% set version = "0.4.0" %}

package:
  name: wcwidth
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/wcwidth/wcwidth-{{ version }}.tar.gz
  sha256: 46478e02cf7149ba150fb93c39880623ee7e5181c64eda167b6a1de51b7a7ba1

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - wcwidth
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/jquast/wcwidth
  license: MIT
  license_file: LICENSE
  summary: Measures number of Terminal column cells of wide-character codes.

extra:
  recipe-maintainers:
    - ocefpaf
