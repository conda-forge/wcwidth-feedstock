{% set version = "0.5.0" %}

package:
  name: wcwidth
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/wcwidth/wcwidth-{{ version }}.tar.gz
  sha256: f89c103c949a693bf563377b2153082bf58e309919dfb7f27b04d862a0089333

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - wcwidth
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/jquast/wcwidth
  license: MIT
  license_file: LICENSE
  summary: Measures number of Terminal column cells of wide-character codes.

extra:
  recipe-maintainers:
    - ocefpaf
