schema_version: 1

context:
  version: 0.2.14
  python_min: "3.8"

package:
  name: wcwidth
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wcwidth/wcwidth-${{ version }}.tar.gz
  sha256: 4d478375d31bc5395a3c55c40ccdf3354688364cd61c4f6adacaa9215d0b3605

build:
  number: 1
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - wcwidth
      pip_check: true

about:
  homepage: https://github.com/jquast/wcwidth
  license: MIT
  license_file: LICENSE
  summary: Measures the display width of unicode strings in a terminal
  description: |
    This library provides a simple way to determine the display width of
    unicode strings in a terminal. By default, the POSIX character widths are
    assumed (build 11.0).

extra:
  recipe-maintainers:
    - jquast
